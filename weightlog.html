<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://fonts.googleapis.com https://fonts.gstatic.com;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<title>ระบบบันทึกข้อมูลห้องชั่ง - SPM Feed Mill</title>
<style>
  :root{
    --primary:#0f9d58; --primary-dark:#0b7a43; --bg:#f3f6f4; --card:#ffffff; --border:#e0e4e2;
    --text:#202124; --muted:#5f6368; --danger:#d93025; --warn:#f9ab00; --radius:10px;
  }
  *{box-sizing:border-box;}
  html{ overscroll-behavior-y:contain; }
  body{ margin:0; font-family:'Sarabun','Segoe UI',Tahoma,sans-serif; background:var(--bg); color:var(--text); touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
  header.appbar{ background:var(--card); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20; flex-wrap:wrap; gap:10px; }
  header.appbar h1{ font-size:18px; margin:0; }
  .appbar-right{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  nav.tabs{ display:flex; gap:6px; flex-wrap:wrap; }
  nav.tabs button{ border:none; background:transparent; padding:12px 18px; border-radius:20px; font-size:15px; cursor:pointer; color:var(--muted); font-weight:700; min-height:44px; }
  nav.tabs button.active{ background:var(--primary); color:#fff; }
  main{ max-width:820px; margin:20px auto; padding:0 14px 60px; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; margin-bottom:18px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .card h2{ font-size:16px; margin:0 0 16px; display:flex; align-items:center; gap:8px; }
  .field{ margin-bottom:16px; }
  .field > label{ display:block; font-size:15px; font-weight:600; margin-bottom:7px; }
  input[type=text], input[type=number], input[type=date], textarea, select{
    width:100%; padding:14px; border:1.5px solid var(--border); border-radius:8px; font-size:16px;
    font-family:inherit; background:#fff; color:var(--text); min-height:48px;
  }
  .btn{ background:var(--primary); color:#fff; border:none; padding:15px 24px; border-radius:26px; font-size:17px; font-weight:700; cursor:pointer; width:100%; min-height:52px; }
  .btn:hover{ background:var(--primary-dark); }
  
  /* เพิ่มเติมส่วนการแสดงผลแบบบล็อกให้เหมือนรายวัน */
  .item-block { border: 1.5px solid var(--border); padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #fff; }
  .print-meta { margin-bottom: 8px; font-size: 14px; }
  .print-meta span { margin-right: 20px; font-weight: 600; }
  
  @media print {
    .no-print { display: none !important; }
    #print-area { display: block !important; }
    .item-block { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<header class="appbar">
  <h1>⚖️ ห้องชั่ง SPM</h1>
  <div class="appbar-right">
    <nav class="tabs">
      <button type="button" class="active" onclick="switchTab('form')">บันทึกข้อมูล</button>
      <button type="button" onclick="switchTab('report')">ประวัติ &amp; รายงาน</button>
    </nav>
  </div>
</header>

<main>
  <section id="page-form">
    </section>

  <section id="page-report" style="display:none;">
    <div class="card no-print">
      <h2><span class="icon">📅</span> 1. เลือกช่วงเวลาที่ต้องการสรุป</h2>
      <div style="display:flex; gap:15px; margin-bottom:14px;">
        <label><input type="radio" name="reportScope" value="daily" checked onclick="toggleScopeInput()"> รายวัน</label>
        <label><input type="radio" name="reportScope" value="range" onclick="toggleScopeInput()"> ช่วงวันที่ (Custom)</label>
      </div>
      
      <div style="display:flex; gap:10px; align-items:center;">
        <div id="div_daily"><input type="date" id="r_dateSelect"></div>
        <div id="div_range" style="display:none; display:flex; gap:5px; align-items:center;">
          <input type="date" id="r_startDate"> ถึง <input type="date" id="r_endDate">
        </div>
        <button type="button" class="btn" style="width:auto;" onclick="buildQuickSummary()">⚡ ดึงรายงาน</button>
      </div>
    </div>

    <div class="card" id="summaryOutputCard" style="display:none;">
      <button type="button" class="btn no-print" onclick="window.print()">🖨️ พิมพ์ / Export PDF</button>
      <div id="print-area"></div>
    </div>
  </section>
</main>

<script>
function toggleScopeInput() {
  const scope = document.querySelector('input[name="reportScope"]:checked').value;
  document.getElementById('div_daily').style.display = scope === 'daily' ? 'block' : 'none';
  document.getElementById('div_range').style.display = scope === 'range' ? 'flex' : 'none';
}

// ฟังก์ชันดึงรายงานที่ปรับปรุงให้รองรับช่วงวันที่
async function buildQuickSummary() {
  const scope = document.querySelector('input[name="reportScope"]:checked').value;
  let start, end, title;

  if (scope === 'daily') {
    start = end = document.getElementById('r_dateSelect').value;
    title = `วันที่ ${start}`;
  } else {
    start = document.getElementById('r_startDate').value;
    end = document.getElementById('r_endDate').value;
    title = `วันที่ ${start} ถึง ${end}`;
  }

  // ดึงข้อมูลจาก API (คงตรรกะเดิมของคุณไว้)
  const allRecords = await fetchRecordsFromGoogle(); // สมมติชื่อฟังก์ชันดึงข้อมูลเดิม
  const filtered = allRecords.filter(r => r.date >= start && r.date <= end);
  
  generatePrintLayout(filtered, title);
  document.getElementById('summaryOutputCard').style.display = 'block';
}

// ปรับปรุงฟังก์ชันให้แสดงผลเหมือนหน้า "รายวัน" ทุกประการ
function generatePrintLayout(records, periodTitle) {
  const printArea = document.getElementById('print-area');
  
  let blocksHtml = records.sort((a,b) => a.date.localeCompare(b.date)).map(r => `
    <div class="item-block">
      <div class="print-meta">
        <span>📅 วันที่: ${r.date}</span>
        <span>🕒 กะ: ${r.shift}</span>
        <span>👤 เวรชั่ง: ${r.weighmaster}</span>
      </div>
      <div style="font-size:14px; margin-bottom:5px;">
        <b>📊 ยอดรถ:</b> วัตถุดิบออก ${r.veh_rawmat_out} | อาหารออก ${r.veh_feed_out} | อาหารใน ${r.veh_feed_in} | วัตถุดิบใน ${r.veh_rawmat_in}
      </div>
      <div style="font-size:14px; background:${r.problems ? '#fff3cd' : '#e6f4ea'}; padding:10px; border-radius:4px;">
        <b>⚠️ รายละเอียดปัญหา:</b> ${r.problems ? r.problems.replace(/\n/g, '<br>') : 'ปกติ'}
      </div>
    </div>
  `).join('');

  printArea.innerHTML = `
    <h2>รายงานสรุปห้องชั่ง SPM</h2>
    <p><b>ช่วงเวลา:</b> ${periodTitle}</p>
    ${blocksHtml}
  `;
}

// ... โค้ดส่วนอื่นๆ คงเดิม ...
</script>
</body>
</html>
