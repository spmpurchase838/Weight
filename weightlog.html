<section id="page-report" style="display:none;">
  <div class="card no-print">
    <h2><span class="icon">📅</span> เลือกช่วงเวลาเพื่อดูรายงาน</h2>
    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:14px;">
      <label style="font-weight:600;"><input type="radio" name="reportScope" value="daily" checked onclick="toggleScopeInput()"> รายวัน</label>
      <label style="font-weight:600;"><input type="radio" name="reportScope" value="range" onclick="toggleScopeInput()"> เลือกช่วงวันที่</label>
    </div>
    
    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
      <div id="div_daily"><input type="date" id="r_dateSelect"></div>
      <div id="div_range" style="display:none; display:flex; gap:10px; align-items:center;">
        <input type="date" id="r_startDate"> ถึง <input type="date" id="r_endDate">
      </div>
      <button type="button" class="btn" style="width:auto; padding:0 24px;" onclick="buildQuickSummary()">⚡ ดึงรายงาน</button>
    </div>
  </div>
  </section>

<script>
// ปรับฟังก์ชัน toggleScopeInput
function toggleScopeInput() {
  const scope = document.querySelector('input[name="reportScope"]:checked').value;
  document.getElementById('div_daily').style.display = scope === 'daily' ? 'block' : 'none';
  document.getElementById('div_range').style.display = scope === 'range' ? 'flex' : 'none';
}

// ปรับฟังก์ชัน buildQuickSummary
async function buildQuickSummary() {
  const scope = document.querySelector('input[name="reportScope"]:checked').value;
  let startDate, endDate, titlePeriod;

  if (scope === 'daily') {
    startDate = endDate = document.getElementById('r_dateSelect').value;
    titlePeriod = startDate;
  } else {
    startDate = document.getElementById('r_startDate').value;
    endDate = document.getElementById('r_endDate').value;
    titlePeriod = `${startDate} ถึง ${endDate}`;
  }
  
  if (!startDate || !endDate) { showToast('กรุณาเลือกวันที่ให้ครบถ้วน', 'error'); return; }
  
  // ... (ส่วนการ fetch ข้อมูลคงเดิม) ...
  
  // กรองข้อมูลตามช่วงวันที่
  const matchRecords = records.filter(r => r.date >= startDate && r.date <= endDate);
  
  document.getElementById('summaryPeriodTitle').innerText = `📅 ช่วงเวลา: ${titlePeriod}`;
  // ... (คำนวณ stats และแสดงผล details คงเดิม) ...
  
  document.getElementById('summaryOutputCard').style.display = 'block';
  renderSimpleTable(matchRecords);
  generatePrintLayout(matchRecords, titlePeriod);
}

// ปรับฟังก์ชัน generatePrintLayout ให้เป็นรูปแบบบล็อก (เหมือนรายวัน)
function generatePrintLayout(records, periodTitle) {
  const printArea = document.getElementById('print-area');
  let blocksHtml = '';

  if (records.length === 0) {
    blocksHtml = '<div class="empty-state">ไม่มีข้อมูลในช่วงเวลาที่เลือก</div>';
  } else {
    records.sort((a, b) => a.date.localeCompare(b.date)).forEach(r => {
      const hasProblem = r.problems && String(r.problems).trim();
      blocksHtml += `
        <div class="item-block">
          <div class="print-meta">
            <span><b>วันที่:</b> ${r.date}</span>
            <span><b>กะ:</b> ${r.shift}</span>
            <span><b>เจ้าหน้าที่:</b> ${r.weighmaster}</span>
          </div>
          <div style="font-size:14px; margin-bottom:5px;">
            <b>📊 ยอดรถ:</b> วัตถุดิบออก ${r.veh_rawmat_out} | อาหารออก ${r.veh_feed_out} | อาหารใน ${r.veh_feed_in} | วัตถุดิบใน ${r.veh_rawmat_in}
          </div>
          ${hasProblem ? `<div style="font-size:14px; white-space:pre-wrap; background:#f9f9f9; padding:10px; border-left:3px solid #d93025;"><b>⚠️ รายงานปัญหา:</b>\n${r.problems}</div>` : '<div style="font-size:14px; color:#0f9d58;">✅ ปกติ</div>'}
        </div>
      `;
    });
  }

  printArea.innerHTML = `
    <div class="print-header"><h2>📋 รายงานสรุปห้องชั่ง</h2><div><b>ช่วงเวลา:</b> ${periodTitle}</div></div>
    <div class="print-section">${blocksHtml}</div>
  `;
}
</script>
